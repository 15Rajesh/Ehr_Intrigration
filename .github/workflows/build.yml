name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature-*
  pull_request:
    branches:
      - main
      - develop

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build Application
        run: ./mvnw clean install

      - name: Run Unit Tests
        run: ./mvnw test

      - name: Build Docker Image
        run: docker build -t ehr-integration-platform .

      - name: Verify Docker Image
        run: docker images